<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Actualizar viaje · Taylor Farms Baja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#1B5E3B; --verde-osc:#12402A; --asfalto:#3A3D38; --carbon:#22261F;
    --crema:#F4F3EC; --blanco:#FFFFFF; --ambar:#E8A13D; --ambar-osc:#8A5A12;
    --gris:#6E7168; --linea:#DDDBD0; --ok:#1B7A44; --rojo:#B3402E; --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Barlow',system-ui,sans-serif; background:var(--crema); color:var(--carbon);
    font-size:17px; line-height:1.45; min-height:100vh; display:flex; justify-content:center;}
  .phone{width:100%; max-width:430px; min-height:100vh; display:flex; flex-direction:column;}
  header{background:var(--verde); color:#fff; padding:18px 20px 16px;}
  .marca{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .marca .logo{font-family:'Barlow Semi Condensed'; font-weight:700; font-size:15px; letter-spacing:.14em; text-transform:uppercase; opacity:.92;}
  .marca .depto{font-size:12.5px; opacity:.75;}
  .placa{background:var(--verde-osc); border:1px solid rgba(255,255,255,.18); border-radius:var(--radius); padding:14px 16px;}
  .placa .oc-label{font-size:12px; text-transform:uppercase; letter-spacing:.1em; opacity:.7;}
  .placa .oc{font-family:'Barlow Semi Condensed'; font-weight:700; font-size:30px; line-height:1.1;}
  .placa-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; margin-top:12px; padding-top:12px; border-top:1px dashed rgba(255,255,255,.25);}
  .dato .l{font-size:11.5px; text-transform:uppercase; letter-spacing:.09em; opacity:.65;}
  .dato .v{font-family:'Barlow Semi Condensed'; font-weight:700; font-size:16px; letter-spacing:.04em;}
  main{flex:1; padding:20px 20px 120px;}
  h2{font-family:'Barlow Semi Condensed'; font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:.12em; color:var(--gris); margin:26px 0 12px;}
  h2:first-child{margin-top:2px;}
  .estados{display:grid; gap:10px;}
  .estado{display:flex; align-items:center; gap:12px; background:var(--blanco); border:1px solid var(--linea);
    border-radius:var(--radius); padding:15px 16px; font:inherit; font-weight:600; font-size:17px; text-align:left; cursor:pointer; color:var(--carbon);}
  .estado .punto{width:14px; height:14px; border-radius:50%; border:3px solid var(--linea); flex-shrink:0;}
  .estado.activo{border-color:var(--ok); background:#F0F7F2;}
  .estado.activo .punto{border-color:var(--ok); background:var(--ok);}
  .estado:disabled{opacity:.55; cursor:default;}
  .estado:focus-visible, .add-foto:focus-visible, .cta:focus-visible{outline:3px solid var(--ambar); outline-offset:2px;}
  .estado .hora{margin-left:auto; font-size:13px; color:var(--ok); font-weight:600;}
  .btn-inc{width:100%; margin-top:12px; display:flex; align-items:center; justify-content:center; gap:8px;
    background:#FBF1EF; border:1.5px solid var(--rojo); color:var(--rojo); border-radius:var(--radius);
    padding:13px 16px; font:inherit; font-weight:600; font-size:16px; cursor:pointer;}
  .btn-inc:focus-visible{outline:3px solid var(--ambar); outline-offset:2px;}
  .inc-form{margin-top:10px; background:var(--blanco); border:1px solid var(--linea); border-radius:var(--radius); padding:14px;}
  .inc-form textarea{width:100%; min-height:84px; border:1px solid var(--linea); border-radius:10px; padding:10px 12px;
    font:inherit; font-size:16px; resize:vertical; background:var(--crema);}
  .inc-form textarea:focus{outline:2px solid var(--rojo);}
  .inc-form .enviar{margin-top:10px; width:100%; border:0; border-radius:10px; background:var(--rojo); color:#fff;
    font:inherit; font-weight:600; font-size:16px; padding:13px; cursor:pointer;}
  .inc-form .enviar:disabled{opacity:.6; cursor:default;}
  .inc-hecha{margin-top:12px; background:#FBF1EF; border:1px solid var(--rojo); color:var(--rojo);
    border-radius:var(--radius); padding:13px 16px; font-weight:600; font-size:15px; text-align:center;}
  .fotos-caja{background:var(--blanco); border:1px solid var(--linea); border-radius:var(--radius); padding:16px;}
  .fotos-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .foto{position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; background:var(--linea);}
  .foto img{width:100%; height:100%; object-fit:cover; display:block;}
  .foto .estado-f{position:absolute; bottom:0; left:0; right:0; font-size:11px; font-weight:600; text-align:center; padding:3px 0; color:#fff; background:rgba(0,0,0,.5);}
  .foto.subida .estado-f{background:rgba(27,122,68,.92);}
  .foto.error .estado-f{background:rgba(179,64,46,.94); cursor:pointer;}
  .add-foto{aspect-ratio:1; border:2px dashed var(--ambar); border-radius:10px; background:#FDF6EA; color:var(--ambar-osc);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; font:inherit; font-weight:600; font-size:13.5px;}
  .add-foto svg{width:26px; height:26px;}
  .fotos-nota{font-size:13.5px; color:var(--gris); margin-top:12px;}
  .barra{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px;
    background:linear-gradient(transparent, var(--crema) 30%); padding:18px 20px calc(16px + env(safe-area-inset-bottom));}
  .cta{width:100%; border:0; border-radius:var(--radius); background:var(--verde); color:#fff; font:inherit; font-weight:600;
    font-size:18px; padding:17px; cursor:pointer;}
  .cta:disabled{background:#A9B3A5; cursor:default;}
  .toast{position:fixed; left:50%; bottom:100px; transform:translateX(-50%); background:var(--carbon); color:#fff;
    padding:12px 20px; border-radius:99px; font-size:15px; font-weight:500; opacity:0; pointer-events:none; transition:opacity .25s; max-width:90%; text-align:center; z-index:9;}
  .toast.ver{opacity:1;}
  .velo{position:fixed; inset:0; background:var(--crema); display:flex; align-items:center; justify-content:center; padding:30px; text-align:center; color:var(--rojo); font-weight:600; z-index:10;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="marca">
      <span class="logo">Taylor Farms Baja</span>
      <span class="depto">Transportes</span>
    </div>
    <div class="placa">
      <div class="oc-label">Orden de compra</div>
      <div class="oc" id="hOC">—</div>
      <div class="placa-grid">
        <div class="dato"><div class="l">Cita</div><div class="v" id="hCita">—</div></div>
        <div class="dato"><div class="l">Marchamo</div><div class="v" id="hMarchamo">—</div></div>
      </div>
    </div>
  </header>

  <main>
    <h2>¿Dónde va el viaje?</h2>
    <div class="estados" id="estados"></div>
    <button class="btn-inc" id="btnInc" type="button">&#9888; Reportar incidencia</button>
    <div class="inc-form" id="incForm" hidden>
      <textarea id="incTexto" maxlength="500" placeholder="Describe brevemente qué pasó (rechazo, demora, percance...)"></textarea>
      <button class="enviar" id="incEnviar" type="button">Enviar reporte de incidencia</button>
    </div>

    <h2>Fotos de entrega</h2>
    <div class="fotos-caja">
      <div class="fotos-grid" id="fotosGrid">
        <button class="add-foto" id="btnFoto" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Tomar foto
        </button>
      </div>
      <p class="fotos-nota">Toma fotos del sello, la mercancía y el sello de recibido. Se necesita al menos 1 foto subida para confirmar la entrega. Si una foto falla, tócala para reintentar.</p>
      <input type="file" id="inputFoto" accept="image/*" capture="environment" multiple hidden>
    </div>
  </main>

  <div class="barra"><button class="cta" id="btnEntrega" disabled>Confirmar entrega</button></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</div>

<script>
/* ================= CONFIGURACIÓN =================
   Pega aquí la URL del desencadenador HTTP del Flujo 2
   (Power Automate → flujo → "Cuando se recibe una solicitud HTTP" → URL) */
const FLOW_URL = "https://default0b031fc984e1487c945fe6dbd618cd.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/01292a6a2c8340a6bd61cb28299f0f9e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=EndQz8LcnTaCW074KeTS1xShUMlDpMkCGKaaVAb9bCk";
/* ================================================= */

const params = new URLSearchParams(location.search);
const tripKey = params.get("k") || "";
const token   = params.get("t") || "";

// El TripKey trae los datos visibles: OC_Cita_Marchamo
const [oc, cita, marchamo] = tripKey.split("_");
if (!tripKey || !token || !oc) {
  document.body.insertAdjacentHTML("beforeend",
    '<div class="velo">Link incompleto.<br>Escanea de nuevo el código QR de tu hoja de marchamo.</div>');
} else {
  document.getElementById("hOC").textContent = oc;
  document.getElementById("hCita").textContent = cita || "—";
  document.getElementById("hMarchamo").textContent = marchamo || "—";
}

const ESTADOS = ["En tránsito", "En destino"];
let estatusActual = null;
let fotosSubidas = 0;

// ---- comunicación con Power Automate ----
// Content-Type text/plain evita el preflight CORS que Power Automate no contesta.
async function llamarFlujo(payload) {
  const res = await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ tripKey, token, ...payload }),
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
  return data;
}

// ---- estatus ----
const cont = document.getElementById("estados");
ESTADOS.forEach((nombre) => {
  const b = document.createElement("button");
  b.className = "estado"; b.type = "button";
  b.innerHTML = `<span class="punto"></span>${nombre}<span class="hora"></span>`;
  b.addEventListener("click", async () => {
    b.disabled = true;
    try {
      await llamarFlujo({ accion: "estatus", estatus: nombre });
      estatusActual = nombre;
      document.querySelectorAll(".estado").forEach(x => x.classList.remove("activo"));
      b.classList.add("activo");
      b.querySelector(".hora").textContent =
        new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
      avisar(`Estatus enviado: ${nombre}`);
    } catch (e) { avisar(e.message === "Failed to fetch" ? "Sin señal — intenta de nuevo" : e.message); }
    b.disabled = false;
    actualizarCTA();
  });
  cont.appendChild(b);
});

// ---- incidencia ----
const btnInc = document.getElementById("btnInc");
const incForm = document.getElementById("incForm");
btnInc.addEventListener("click", () => {
  incForm.hidden = !incForm.hidden;
  if (!incForm.hidden) document.getElementById("incTexto").focus();
});
document.getElementById("incEnviar").addEventListener("click", async () => {
  const texto = document.getElementById("incTexto").value.trim();
  if (!texto) { avisar("Describe brevemente la incidencia antes de enviar"); return; }
  const btn = document.getElementById("incEnviar");
  btn.disabled = true;
  try {
    await llamarFlujo({ accion: "estatus", estatus: "Incidencia", comentario: texto });
    incForm.hidden = true;
    btnInc.insertAdjacentHTML("afterend",
      '<div class="inc-hecha">Incidencia reportada \u2014 el equipo de Transportes fue notificado</div>');
    btnInc.remove();
    avisar("Incidencia enviada");
  } catch (e) {
    avisar(e.message === "Failed to fetch" ? "Sin se\u00f1al \u2014 intenta de nuevo" : e.message);
    btn.disabled = false;
  }
});

// ---- fotos ----
document.getElementById("btnFoto").addEventListener("click", () => document.getElementById("inputFoto").click());
document.getElementById("inputFoto").addEventListener("change", (e) => {
  [...e.target.files].forEach(prepararFoto);
  e.target.value = "";
});

async function prepararFoto(file) {
  const blob = await comprimir(file);
  const url = URL.createObjectURL(blob);
  const d = document.createElement("div");
  d.className = "foto";
  d.innerHTML = `<img src="${url}" alt="Foto de entrega"><span class="estado-f">Subiendo…</span>`;
  document.getElementById("fotosGrid").insertBefore(d, document.getElementById("btnFoto"));
  subirFoto(d, blob);
}

async function subirFoto(nodo, blob) {
  nodo.className = "foto";
  nodo.querySelector(".estado-f").textContent = "Subiendo…";
  try {
    const b64 = await aBase64(blob);
    await llamarFlujo({ accion: "foto", nombre: `pod_${Date.now()}.jpg`, contenido: b64 });
    fotosSubidas++;
    nodo.classList.add("subida");
    nodo.querySelector(".estado-f").textContent = "Subida ✓";
  } catch (e) {
    nodo.classList.add("error");
    nodo.querySelector(".estado-f").textContent = "Falló — reintentar";
    nodo.querySelector(".estado-f").onclick = () => subirFoto(nodo, blob);
    avisar("No se pudo subir la foto. Tócala para reintentar.");
  }
  actualizarCTA();
}

// Comprime en el teléfono: máx 1600 px de lado, JPEG 72%
async function comprimir(file) {
  try {
    const img = await createImageBitmap(file);
    const escala = Math.min(1, 1600 / Math.max(img.width, img.height));
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * escala);
    c.height = Math.round(img.height * escala);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    return await new Promise((r) => c.toBlob(r, "image/jpeg", 0.72));
  } catch (e) { return file; } // si el navegador no soporta, manda original
}

function aBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ---- entrega ----
const btnEntrega = document.getElementById("btnEntrega");
function actualizarCTA() {
  btnEntrega.disabled = !(fotosSubidas > 0 && estatusActual !== "Entregada");
}
btnEntrega.addEventListener("click", async () => {
  btnEntrega.disabled = true;
  try {
    await llamarFlujo({ accion: "estatus", estatus: "Entregado" });
    btnEntrega.textContent = "Entrega confirmada ✓";
    estatusActual = "Entregada";
    avisar("Entrega confirmada — gracias, buen viaje de regreso");
  } catch (e) {
    avisar(e.message === "Failed to fetch" ? "Sin señal — intenta de nuevo" : e.message);
    btnEntrega.disabled = false;
  }
});

let tt;
function avisar(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("ver");
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove("ver"), 3000);
}
</script>
</body>
</html>
